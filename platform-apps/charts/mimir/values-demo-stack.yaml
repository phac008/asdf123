mimir:
  nginx:
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        external-dns.alpha.kubernetes.io/ttl: "60"
        cert-manager.io/cluster-issuer: default-issuer
      hosts:
        - host: metrics-monitoring.127-0-0-1.nip.io
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: mimir-nginx-tls
          hosts:
            - metrics-monitoring.127-0-0-1.nip.io
  mimir:
    structuredConfig:
      limits:
        max_global_series_per_user: 500000
  distributor:
    resources:
      limits:
        cpu: 3.5
        memory: 6Gi
  ingester:
    replicas: 1
    zoneAwareReplication:
      enabled: false
    resources:
      requests:
        cpu: 50m
      limits:
        cpu: 5
        memory: 6Gi
    persistentVolume:
      size: 5Gi
  store_gateway:
    zoneAwareReplication:
      enabled: false
    resources:
      requests:
        cpu: 50m
  querier:
    replicas: 1
  query-scheduler:
    replicas: 1
  minio:
    persistence:
      size: 10Gi
